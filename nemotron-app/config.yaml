# nemotron-app configuration — every tunable lives here (no magic numbers in code).
# Relative paths are resolved against this file's directory (nemotron-app/).
# Secrets (HF_TOKEN, TAVILY_API_KEY) come from .env / environment, never this file.

server:
  host: 127.0.0.1
  port: 8000
  # Reuse the llama-server.exe binary the nemotron-local notebook already downloaded.
  binary_path: ../nemotron-local/llama-bin/bin/llama-server.exe
  startup_timeout_s: 1800   # generous: the first selection of an -hf model downloads several GB
  reuse_existing: true      # attach to a healthy server on host:port ONLY if it runs the active model
  # --- shared runtime, applied to whichever model is launched ---
  flash_attn: true          # Ampere (cc 8.6) supports FlashAttention -> -fa on (prereq for KV-cache quant)
  n_gpu_layers: 99          # offload every layer to the GPU (-ngl); any 3-6B fully fits 12 GB
  cache_type_k: q8_0        # halve KV-cache VRAM at ~zero quality cost (needs flash_attn)
  cache_type_v: q8_0
  jinja: true               # apply each GGUF's own embedded chat template (server-side templating)
  reasoning_format: deepseek  # server splits <think>...</think> into a separate reasoning_content field

# Selectable models (sidebar dropdown). Exactly one is resident in VRAM at a time.
# Each entry is EITHER a local file (gguf_path) OR an auto-download (hf_repo + quant),
# which llama-server fetches on first use via `-hf <repo>:<quant>`.
# NOTE: repo ids / quant tags below should be confirmed against the live HF model card
# before first run (some models post-date the project's notes; exact tags vary). Prefer
# official or `bartowski` GGUF repos — they are ungated, so -hf needs no HF token.
models:
  active: nemotron-nano-4b    # which model loads at startup
  available:
    - name: nemotron-nano-4b
      label: "Nemotron Nano 4B (Q4_K_M, local)"
      gguf_path: ../nemotron-local/models/NVIDIA-Nemotron3-Nano-4B-Q4_K_M.gguf
      hf_repo: null
      quant: null
      n_ctx: 16384            # the SSM-hybrid KV cache makes 16k cheap
      supports_thinking: true
      sampling: { temperature: 0.6, top_p: 0.95, max_new_tokens: 512 }

    - name: qwen3-4b-instruct
      label: "Qwen3 4B Instruct 2507 (general chat)"
      gguf_path: null
      hf_repo: Qwen/Qwen3-4B-Instruct-2507-GGUF
      quant: Q6_K
      n_ctx: 16384
      supports_thinking: false
      sampling: { temperature: 0.7, top_p: 0.8, max_new_tokens: 768 }

    - name: qwen3-4b-thinking
      label: "Qwen3 4B Thinking 2507 (reasoning/math)"
      gguf_path: null
      hf_repo: bartowski/Qwen_Qwen3-4B-Thinking-2507-GGUF
      quant: Q6_K
      n_ctx: 32768            # dedicated reasoner — budget generously for long <think> blocks
      supports_thinking: true
      sampling: { temperature: 0.6, top_p: 0.95, max_new_tokens: 2048 }

    - name: phi-4-mini
      label: "Phi-4 mini instruct (coding/math, MIT)"
      gguf_path: null
      hf_repo: bartowski/microsoft_Phi-4-mini-instruct-GGUF
      quant: Q6_K
      n_ctx: 16384
      supports_thinking: false
      sampling: { temperature: 0.7, top_p: 0.9, max_new_tokens: 768 }

    - name: gemma-3-4b
      label: "Gemma 3 4B it (long-context, multilingual)"
      gguf_path: null
      hf_repo: bartowski/google_gemma-3-4b-it-GGUF
      quant: Q8_0
      n_ctx: 16384
      supports_thinking: false
      sampling: { temperature: 0.7, top_p: 0.95, max_new_tokens: 768 }

    - name: ministral-3-8b
      label: "Ministral 3 8B instruct (Apache-2.0, all-round)"
      gguf_path: null
      hf_repo: bartowski/mistralai_Ministral-3-8B-Instruct-2512-GGUF
      quant: Q4_K_M
      n_ctx: 16384
      supports_thinking: false
      sampling: { temperature: 0.6, top_p: 0.95, max_new_tokens: 768 }

    - name: ministral-3-3b
      label: "Ministral 3 3B instruct (Apache-2.0, light)"
      gguf_path: null
      hf_repo: bartowski/mistralai_Ministral-3-3B-Instruct-2512-GGUF
      quant: Q6_K
      n_ctx: 16384
      supports_thinking: false
      sampling: { temperature: 0.6, top_p: 0.95, max_new_tokens: 768 }

    - name: glm-4-9b
      label: "GLM-4 9B 0414 (tool-use/agentic; needs recent llama.cpp)"
      gguf_path: null
      hf_repo: bartowski/THUDM_GLM-4-9B-0414-GGUF
      quant: Q4_K_M
      n_ctx: 16384
      supports_thinking: false
      sampling: { temperature: 0.6, top_p: 0.95, max_new_tokens: 768 }

    - name: granite-3.3-8b
      label: "Granite 3.3 8B instruct (RAG/enterprise, Apache-2.0)"
      gguf_path: null
      hf_repo: bartowski/ibm-granite_granite-3.3-8b-instruct-GGUF
      quant: Q5_K_M
      n_ctx: 16384
      supports_thinking: false
      sampling: { temperature: 0.6, top_p: 0.9, max_new_tokens: 768 }

    - name: aya-expanse-8b
      label: "Aya Expanse 8B (multilingual; CC-BY-NC, 8k ctx)"
      gguf_path: null
      hf_repo: bartowski/CohereForAI_aya-expanse-8b-GGUF
      quant: Q5_K_M
      n_ctx: 8192             # model's native maximum
      supports_thinking: false
      sampling: { temperature: 0.7, top_p: 0.9, max_new_tokens: 768 }

    - name: smollm3-3b
      label: "SmolLM3 3B (fast/small, fully-open Apache-2.0)"
      gguf_path: null
      hf_repo: ggml-org/SmolLM3-3B-GGUF
      quant: Q8_0
      n_ctx: 16384
      supports_thinking: true
      sampling: { temperature: 0.6, top_p: 0.95, max_new_tokens: 768 }

sampling:
  temperature: 0.6
  top_p: 0.95
  max_new_tokens: 512
  stop: ["<|im_end|>", "<|endoftext|>", "</s>"]

reasoning:
  thinking_default: true
  thinking_budget: null   # null = uncapped; int = best-effort cap on reasoning tokens

rag:
  enabled_default: false
  embedding_model: BAAI/bge-small-en-v1.5
  embedding_device: cpu   # cpu | cuda  (cpu avoids contention with the llama-server)
  chunk_size: 800         # characters per chunk
  chunk_overlap: 120      # character overlap between adjacent chunks
  top_k: 4                # chunks retrieved per query
  max_context_chars: 8000 # hard cap on injected RAG context (keeps the 16k window safe)
  persist_dir: ./data/chroma
  collection_name: user_docs
  # bge models want this instruction prefixed to the query (not the documents).
  query_instruction: "Represent this sentence for searching relevant passages: "
  supported_extensions: [pdf, txt, md, docx]

web_search:
  enabled_default: false
  provider: duckduckgo    # duckduckgo (no key) | tavily (needs TAVILY_API_KEY)
  result_count: 5
  fetch_pages: false      # if true, fetch + strip each top result page for fuller context
  fetch_char_limit: 2000  # max chars kept per fetched page
  request_timeout_s: 8    # per-request HTTP timeout when fetching pages
  total_time_budget_s: 20 # overall budget for the fetch phase
  max_context_chars: 6000 # hard cap on injected web context

prompts:
  chat_system: "You are a helpful, concise assistant."
  coding_system: >-
    You are an expert programmer. Give correct, runnable code in fenced code
    blocks with a language tag. Explain briefly first, then show the code. Prefer
    standard libraries and idiomatic, readable style.
  # Header prepended to retrieved document context. {context} is filled in by the app.
  rag_system: >-
    Use the following document excerpts to answer the user's question. Cite
    sources inline as [filename p.N]. If the answer is not in the excerpts, say
    you could not find it in the provided documents.
  # Header prepended to web-search results. {context} is filled in by the app.
  web_system: >-
    Use the following web search results to answer the user's question. Cite
    sources inline as [n] using the result numbers. Prefer recent, relevant
    results and note if the results do not contain the answer.

ui:
  temperature_range: [0.0, 1.5]
  top_p_range: [0.1, 1.0]
  max_new_tokens_range: [64, 4096]

gpu:
  show_vram: true       # live VRAM meter in the sidebar (reads nvidia-smi)
  refresh_seconds: 2     # how often the meter polls nvidia-smi
  device_index: 0        # which GPU to display
