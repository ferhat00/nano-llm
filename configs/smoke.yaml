# Smoke config: CPU-friendly, runs end-to-end in 2-3 min.
# Use this to validate plumbing before spending Kaggle GPU quota.
seed: 1337
out_dir: ./_smoke_run

tokenizer:
  type: bpe                  # 'bpe' or 'gpt2'
  vocab_size: 2048
  train_subset_docs: 200     # how many docs the BPE trainer sees

data:
  dataset: roneneldan/TinyStories
  text_field: text
  subset_train: 1000
  subset_val: 200

model:
  n_layer: 2
  n_head: 4
  n_embd: 64
  block_size: 128
  dropout: 0.0

train:
  device: cpu
  precision: fp32            # no AMP on CPU
  distributed: false
  batch_size: 8
  grad_accum: 1
  max_steps: 30
  learning_rate: 3.0e-4
  min_lr: 3.0e-5
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_steps: 5
  eval_interval: 10
  eval_iters: 5
  sample_interval: 30
  checkpoint_interval: 10
  keep_last_k: 3

sample:
  prompt: "Once upon a time"
  max_new_tokens: 40
  temperature: 0.9
  top_k: 40
  top_p: 0.9
